version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GRAPH_REGISTRY_DB_PATH=/app/data/graph_registry.db
      - GRAPH_RAG_MEMORY_DB_PATH=/app/data/graph_rag_memory.db
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
